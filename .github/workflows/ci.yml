name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck bin/grove install.sh

      - name: install bats + jq
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: bats
        run: bats test/
